name: Deploy frontend to Cloudflare Pages

on:
  workflow_dispatch:
    inputs:
      skip_build:
        description: Deploy existing frontend/dist artifact only
        required: false
        default: false
        type: boolean
  push:
    branches: [main]
    paths:
      - "frontend/**"
      - ".github/workflows/deploy-pages.yml"

concurrency:
  group: deploy-pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    env:
      CF_PAGES_PROJECT: ${{ vars.CF_PAGES_PROJECT || 'wc-forecast' }}
      VITE_APP_MODE: published
      VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL }}
      VITE_PUBLISHED_SIMULATION_ID: ${{ secrets.VITE_PUBLISHED_SIMULATION_ID }}
      VITE_PUBLISHED_SCENARIO: ${{ secrets.VITE_PUBLISHED_SCENARIO }}
      VITE_PUBLISHED_SCENARIO_TITLE: ${{ vars.VITE_PUBLISHED_SCENARIO_TITLE || 'Author scenario' }}
      VITE_PUBLISHED_SCENARIO_DESCRIPTION: ${{ vars.VITE_PUBLISHED_SCENARIO_DESCRIPTION || 'A fixed what-if bracket built from chosen group-stage results.' }}
      VITE_CF_WEB_ANALYTICS_TOKEN: ${{ secrets.VITE_CF_WEB_ANALYTICS_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Validate publish secrets
        run: |
          test -n "$VITE_API_BASE_URL" || (echo "Missing secret VITE_API_BASE_URL" && exit 1)
          test -n "$VITE_PUBLISHED_SIMULATION_ID" || (echo "Missing secret VITE_PUBLISHED_SIMULATION_ID" && exit 1)

      - name: Install and build
        if: ${{ github.event_name != 'workflow_dispatch' || inputs.skip_build != true }}
        working-directory: frontend
        run: |
          npm ci
          npm run build

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy frontend/dist --project-name=${{ env.CF_PAGES_PROJECT }}
